spring.application.name=concert-platform

# Server
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/concert_platform
spring.datasource.username=concert_app
spring.datasource.password=admin123

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Logging
logging.level.org.springframework=INFO
logging.level.com.vedant.concert_platform=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Security (temporary for development)
spring.security.user.name=admin
spring.security.user.password=admin123

# Bootstrap producer credentials (first superadmin account)
app.bootstrap.producer.email=producer@concert.local
app.bootstrap.producer.password=${BOOTSTRAP_PRODUCER_PASSWORD:}
app.bootstrap.producer.first-name=Super
app.bootstrap.producer.last-name=Admin

# MFA challenge configuration
app.mfa.challenge.expiration-minutes=5

# Mail (configure with real SMTP credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
